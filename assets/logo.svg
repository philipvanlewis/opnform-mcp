<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="opnform-mcp logo">
  <defs>
    <linearGradient id="bg" x1="8" y1="8" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0B1020" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>
  <!-- a form: title, two inputs, a submit button -->
  <g filter="url(#shadow)">
    <rect x="32" y="34" width="50" height="9" rx="4.5" fill="#ffffff"/>
    <rect x="32" y="51" width="64" height="9" rx="4.5" fill="#ffffff" opacity="0.92"/>
    <rect x="32" y="68" width="64" height="9" rx="4.5" fill="#ffffff" opacity="0.92"/>
    <rect x="32" y="85" width="32" height="11" rx="5.5" fill="#ffffff" opacity="0.80"/>
  </g>
  <!-- MCP connection node, cut out from the form with a white ring -->
  <circle cx="95" cy="89" r="13" fill="#22D3EE" stroke="#ffffff" stroke-width="3"/>
  <path d="M89.5 89.5l3.7 3.7 6.6-7.2" stroke="#0B1020" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
